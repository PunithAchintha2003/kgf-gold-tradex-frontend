name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project with Vercel (Production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://kgf-gold-price-predictor.onrender.com' }}
          VITE_APP_ENV: ${{ secrets.VITE_APP_ENV || 'production' }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME || 'KGF Gold TradeX' }}
          VITE_APP_VERSION: ${{ secrets.VITE_APP_VERSION || '0.1.0' }}
          VITE_ENABLE_ANALYTICS: ${{ secrets.VITE_ENABLE_ANALYTICS || 'true' }}
          VITE_ENABLE_ERROR_LOGGING: ${{ secrets.VITE_ENABLE_ERROR_LOGGING || 'true' }}
          VITE_BUILD_SOURCEMAP: ${{ secrets.VITE_BUILD_SOURCEMAP || 'false' }}
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

      - name: Build project with Vercel (Preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://kgf-gold-price-predictor.onrender.com' }}
          VITE_APP_ENV: ${{ secrets.VITE_APP_ENV || 'preview' }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME || 'KGF Gold TradeX' }}
          VITE_APP_VERSION: ${{ secrets.VITE_APP_VERSION || '0.1.0' }}
          VITE_ENABLE_ANALYTICS: ${{ secrets.VITE_ENABLE_ANALYTICS || 'true' }}
          VITE_ENABLE_ERROR_LOGGING: ${{ secrets.VITE_ENABLE_ERROR_LOGGING || 'true' }}
          VITE_BUILD_SOURCEMAP: ${{ secrets.VITE_BUILD_SOURCEMAP || 'false' }}
        if: github.event_name == 'pull_request'

      - name: Deploy Project Artifacts to Vercel (Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

      - name: Deploy Preview
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        if: github.event_name == 'pull_request'
